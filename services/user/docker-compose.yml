services:
  mysql:
    image: mysql:8.0
    container_name: pocketpick-user-mysql
    ports:
      - "3306:3306"
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: pocketpick_user
    volumes:
      - pocketpick-user-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build: .
    container_name: pocketpick-user-service
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      DB_URL: jdbc:mysql://mysql:3306/pocketpick_user
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  pocketpick-user-mysql-data:
